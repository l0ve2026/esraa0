<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>مانونتي | سكرابوك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Amiri&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0, #ffd9e6);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 540px;
            height: 88vh;
            background: #fffcf7;
            border-radius: 44px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
            border: 1px solid #ffd9e6;
        }

        .pages {
            height: 100%;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            animation: fade 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .page-number {
            text-align: center;
            font-family: 'Amiri', serif;
            color: #e8a9b4;
            margin-bottom: 1rem;
        }
        .page-number::before,
        .page-number::after {
            content: "❁";
            margin: 0 6px;
        }

        .photo-frame {
            background: #fffef5;
            padding: 10px;
            border-radius: 24px 8px 24px 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: inline-block;
            width: 90%;
            margin: 0 auto;
            position: relative;
        }
        .photo-frame img {
            width: 100%;
            border-radius: 16px;
        }
        .tape {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-3deg);
            background: rgba(255,250,210,0.9);
            width: 60px;
            height: 18px;
            border-radius: 20%;
        }

        .btn {
            background: linear-gradient(115deg, #f5b0c0, #e88faa);
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            margin: 1.5rem auto;
            cursor: pointer;
            display: inline-block;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .letter-box {
            background: #fffef7;
            border-radius: 32px;
            padding: 1.8rem;
            box-shadow: inset 0 0 0 2px #fbe6ee, inset 0 0 0 6px #fff0f5;
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            line-height: 1.8;
            text-align: center;
            white-space: pre-line;
            color: #5a3a44;
        }

        .dot-nav {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
        }
        .dot {
            width: 7px;
            height: 7px;
            background: #e8a9b4;
            border-radius: 50%;
            opacity: 0.4;
            cursor: pointer;
        }
        .dot.active {
            width: 22px;
            border-radius: 10px;
            opacity: 1;
        }

        /* سينما */
        .cinema-stage {
            position: relative;
            min-height: 380px;
            background: rgba(255,240,245,0.5);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .img-slider {
            position: absolute;
            transition: all 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            width: 80%;
            max-width: 260px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .img-slider.small {
            width: 35%;
            max-width: 110px;
            left: 85%;
            opacity: 0.7;
        }
        .img-slider img {
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            border: 3px solid white;
        }
        .cinema-caption {
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            width: 45%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 28px;
            font-family: 'Amiri', serif;
            font-size: 0.95rem;
            font-weight: bold;
            color: #ffe6f0;
            text-align: center;
            opacity: 0;
            transition: 0.4s;
        }
        .cinema-caption.show {
            opacity: 1;
        }
        .next-btn {
            margin-top: 70px;
            background: #e8a9b4;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
        }
        .music-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,240,0.9);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .heart-float {
            position: fixed;
            pointer-events: none;
            font-size: 1rem;
            animation: floatUp 5s linear forwards;
            z-index: 200;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(-100vh) rotate(15deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="pages" id="pagesContainer">
        <!-- صفحة 0: بوكيه ورد -->
        <div class="page active" id="page0">
            <div class="page-number">الفصل الأول</div>
            <div style="text-align:center">
                <div class="photo-frame">
                    <img src="images/bouquet.jpg" onerror="this.src='https://placehold.co/400x400/fce4ec/e8a9b4?text=🌹'">
                    <div class="tape"></div>
                </div>
                <div style="font-size:1.8rem; font-weight:800; color:#c2778a; margin:0.5rem 0">welcome Menna</div>
                <div style="color:#b95772">في ناس هديتهم ورد… لكن أنتِ كان لازم ورد ومعاه حكاية 💗</div>
                <button class="btn" id="startBtn">✨ افتتح المفاجأة ✨</button>
            </div>
        </div>

        <!-- صفحة 1: النص الأول -->
        <div class="page" id="page1">
            <div class="page-number">❁ ٢ ❁</div>
            <div class="letter-box" id="textBox1"></div>
        </div>

        <!-- صفحة 2: النص الثاني -->
        <div class="page" id="page2">
            <div class="page-number">❁ ٣ ❁</div>
            <div class="letter-box" id="textBox2"></div>
        </div>

        <!-- صفحة 3: العرض السينمائي -->
        <div class="page" id="page3">
            <div class="page-number">❁ العرض السينمائي ❁</div>
            <div class="cinema-stage">
                <div class="img-slider" id="sliderImg">
                    <img id="cinemaImage" src="images/1.jpg" onerror="this.src='https://placehold.co/300x300/fce4ec?text=📸'">
                </div>
                <div class="cinema-caption" id="cinemaCaption"></div>
            </div>
            <button class="next-btn" id="nextCinema">✨ التالي ✨</button>
            <div id="finishMsg" style="text-align:center; margin-top:1rem; display:none;">❤️ انتهى العرض .. أحبك كثيراً ❤️</div>
        </div>
    </div>
    <div class="dot-nav" id="dotNav"></div>
</div>
<div class="music-icon" id="musicToggle"><i class="fas fa-music"></i></div>

<script>
    (function(){
        // --- قلوب طائرة ---
        setInterval(() => {
            let heart = document.createElement('div');
            heart.innerHTML = Math.random() > 0.6 ? '🌸' : '❤️';
            heart.className = 'heart-float';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 16 + 12) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 1800);

        // --- إدارة الصفحات ---
        const pages = [document.getElementById('page0'), document.getElementById('page1'), document.getElementById('page2'), document.getElementById('page3')];
        let current = 0;
        const dotsDiv = document.getElementById('dotNav');
        function updateDots() {
            dotsDiv.innerHTML = '';
            for (let i=0; i<pages.length; i++) {
                let dot = document.createElement('div');
                dot.classList.add('dot');
                if(i===current) dot.classList.add('active');
                dot.addEventListener('click', ()=>goToPage(i));
                dotsDiv.appendChild(dot);
            }
        }
        function goToPage(index) {
            if(index<0 || index>=pages.length) return;
            pages[current].classList.remove('active');
            current = index;
            pages[current].classList.add('active');
            updateDots();
            // تأثير تقليب
            document.querySelector('.pages').style.transform = 'scale(0.99)';
            setTimeout(()=> document.querySelector('.pages').style.transform = '', 150);
            // عندما نذهب للصفحة 3 نبدأ العرض إذا لم يبدأ
            if(current === 3 && !window.cinemaStarted) startCinema();
        }
        function nextPage() { if(current+1 < pages.length) goToPage(current+1); }
        function prevPage() { if(current-1 >= 0) goToPage(current-1); }
        updateDots();

        // --- سحب باللمس ---
        let startX = 0;
        const container = document.querySelector('.pages');
        container.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        container.addEventListener('touchend', e => {
            let diff = e.changedTouches[0].clientX - startX;
            if(Math.abs(diff) > 40) diff>0 ? prevPage() : nextPage();
        });

        // --- الكتابة الحرفية ---
        function typeWriter(element, text, speed=45) {
            let i=0;
            element.innerHTML = '';
            function write() {
                if(i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(write, speed);
                }
            }
            write();
        }
        const txt1 = "بما أنه يوم مميز ...\nفكان لازم أعمل حاجة شبهك:\nحلوة، مختلفة، ومليانة حب 💗🌷";
        const txt2 = "يمكن الورد يذبل، والصور تفضل ذكرى…\nبس انت مكانك هيفضل ثابت في قلبي 💗🎀\nشكراً على الضحك، والهبل، وكل اللحظات الحلوة\nوربنا يديمك ليا يا احلي منونه 💗🎀";
        let typed1=false, typed2=false;
        function startTyping1() { if(!typed1) { typed1=true; typeWriter(document.getElementById('textBox1'), txt1, 45); } }
        function startTyping2() { if(!typed2) { typed2=true; typeWriter(document.getElementById('textBox2'), txt2, 45); } }

        // --- زر الافتتاح (يذهب للصفحة 1 ويشغل الموسيقى) ---
        const startBtn = document.getElementById('startBtn');
        startBtn.addEventListener('click', ()=>{
            goToPage(1);
            startTyping1();
            // تشغيل الموسيقى
            if(audio && !isPlaying) { audio.play().then(()=>{isPlaying=true; musicIcon.classList.add('playing');}).catch(e=>console.log);}
            else if(!audio) { initAudio(); audio.play().then(()=>{isPlaying=true; musicIcon.classList.add('playing');}).catch(e=>console.log);}
            canvasConfetti({particleCount:80, spread:50, origin:{y:0.6}});
        });

        // عند الدخول للصفحة 2 تبدأ الكتابة الثانية
        const observer = new MutationObserver(()=>{
            if(current===1 && !typed1) startTyping1();
            if(current===2 && !typed2) startTyping2();
        });
        observer.observe(container, {attributes: true, subtree: true});

        // --- العرض السينمائي ---
        let cinemaIndex = 0;
        const images = Array.from({length:10}, (_,i)=>`images/${i+1}.jpg`);
        const captions = [
            "✨ أول لقاء كان سحرياً ✨",
            "💬 ضحكات وسهر ما تخلصش 💬",
            "🌸 أيام كان القلب فيها قريب 🌸",
            "🎀 إنتِ أجمل مفاجأة في حياتي 🎀",
            "💖 ضحكتك بتلم الدنيا كلها 💖",
            "🌟 كل يوم معاكِ قصة حلوة 🌟",
            "🍀 أنتِ سبب سعادتي الحقيقية 🍀",
            "🌹 بحبك أكتر مما تتخيلي 🌹",
            "💌 ذكرى جديدة في رحلتنا 💌",
            "🤍 أنتِ الحب كله 🤍"
        ];
        let cinemaActive = false;
        let timer = null;
        let isAnimating = false;
        const imgElem = document.getElementById('cinemaImage');
        const sliderDiv = document.getElementById('sliderImg');
        const captionDiv = document.getElementById('cinemaCaption');
        const nextBtn = document.getElementById('nextCinema');
        const finishDiv = document.getElementById('finishMsg');

        function resetCinema() {
            if(timer) clearTimeout(timer);
            cinemaIndex = 0;
            finishDiv.style.display = 'none';
            nextBtn.style.display = 'inline-block';
            sliderDiv.classList.remove('small');
            sliderDiv.style.left = '50%';
            captionDiv.classList.remove('show');
            imgElem.src = images[0];
            captionDiv.innerText = captions[0];
            isAnimating = false;
            cinemaActive = true;
            startTimer();
        }
        function startTimer() {
            if(!cinemaActive) return;
            timer = setTimeout(() => {
                if(cinemaActive && !isAnimating) startAnimation();
            }, 2500);
        }
        function startAnimation() {
            if(isAnimating || !cinemaActive) return;
            isAnimating = true;
            sliderDiv.classList.add('small');
            sliderDiv.style.left = '85%';
            setTimeout(() => {
                captionDiv.classList.add('show');
            }, 200);
            setTimeout(() => {
                if(!cinemaActive) return;
                let next = cinemaIndex + 1;
                if(next < images.length) {
                    // تغيير الصورة والنص
                    imgElem.src = images[next];
                    captionDiv.innerText = captions[next];
                    // إرجاع الصورة للوسط
                    sliderDiv.classList.remove('small');
                    sliderDiv.style.left = '50%';
                    captionDiv.classList.remove('show');
                    cinemaIndex = next;
                    isAnimating = false;
                    startTimer();
                } else {
                    // انتهى العرض
                    cinemaActive = false;
                    nextBtn.style.display = 'none';
                    finishDiv.style.display = 'block';
                    canvasConfetti({particleCount:200, spread:80, origin:{y:0.6}});
                }
            }, 2000);
        }
        function manualNext() {
            if(isAnimating || !cinemaActive) return;
            if(timer) clearTimeout(timer);
            if(cinemaIndex + 1 < images.length) {
                // إنهاء الحالة الحالية بسرعة
                sliderDiv.classList.remove('small');
                sliderDiv.style.left = '50%';
                captionDiv.classList.remove('show');
                isAnimating = false;
                cinemaIndex++;
                imgElem.src = images[cinemaIndex];
                captionDiv.innerText = captions[cinemaIndex];
                startTimer();
            } else {
                cinemaActive = false;
                nextBtn.style.display = 'none';
                finishDiv.style.display = 'block';
                canvasConfetti({particleCount:200, spread:80, origin:{y:0.6}});
            }
        }
        function startCinema() {
            if(window.cinemaStarted) return;
            window.cinemaStarted = true;
            resetCinema();
        }
        nextBtn.addEventListener('click', manualNext);

        // --- الموسيقى ---
        let audio = null, isPlaying = false;
        const musicIcon = document.getElementById('musicToggle');
        function initAudio() {
            if(audio) return;
            audio = new Audio('song.mp3');
            audio.loop = true;
            audio.volume = 0.5;
            audio.addEventListener('ended', ()=>{ isPlaying=false; musicIcon.classList.remove('playing'); });
        }
        musicIcon.addEventListener('click', (e)=>{
            e.stopPropagation();
            if(!audio) initAudio();
            if(isPlaying) {
                audio.pause();
                isPlaying=false;
                musicIcon.classList.remove('playing');
            } else {
                audio.play().then(()=>{ isPlaying=true; musicIcon.classList.add('playing'); }).catch(e=>console.log);
            }
        });
        // لا نبدأ موسيقى تلقائياً حتى الضغط على زر الافتتاح
    })();
</script>
</body>
</html>
