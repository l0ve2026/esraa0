<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>افتتح المفاجأة | كتاب الذكريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 40% 40%, #3d1a24, #1a0a10);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .star-field {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #ffe0f0;
            border-radius: 50%;
            box-shadow: 0 0 4px #ffb7c5;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8);}
            100% { opacity: 0.8; transform: scale(1.2);}
        }

        .book-wrapper {
            position: relative;
            width: min(94vw, 550px);
            height: min(86vh, 700px);
            perspective: 1800px;
            z-index: 20;
        }
        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateY(-4deg) rotateX(2deg);
            transition: transform 0.3s ease;
        }
        .book:hover {
            transform: rotateY(-2deg) rotateX(1deg);
        }
        .spine {
            position: absolute;
            right: -18px;
            top: 0;
            width: 18px;
            height: 100%;
            background: linear-gradient(135deg, #a14762, #6e2c46);
            transform: rotateY(90deg) translateZ(-9px);
            transform-origin: right center;
            border-radius: 4px 2px 2px 4px;
            box-shadow: inset -2px 0 8px rgba(0,0,0,0.4);
        }
        .back-cover {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #732c48, #3f1525);
            border-radius: 8px 4px 4px 8px;
            transform: translateZ(-6px);
            box-shadow: inset 0 0 0 1px rgba(255,200,180,0.2);
        }
        .pages {
            position: absolute;
            inset: 0;
            background: #fff8f2;
            border-radius: 6px 12px 12px 6px;
            overflow: hidden;
            box-shadow: inset -4px 0 18px rgba(0,0,0,0.04), inset 6px 0 10px rgba(0,0,0,0.02);
        }
        .page-scroll {
            height: 100%;
            overflow-y: auto;
            padding: 1.8rem 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: #e8a9b4 #ffe0ec;
        }
        .page-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .page-scroll::-webkit-scrollbar-track {
            background: #ffe0ec;
            border-radius: 10px;
        }
        .page-scroll::-webkit-scrollbar-thumb {
            background: #e8a9b4;
            border-radius: 10px;
        }

        .nav-buttons {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 200;
        }
        .nav-btn {
            background: rgba(232, 169, 180, 0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(232, 169, 180, 0.6);
            border-radius: 40px;
            padding: 8px 22px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #ffecf0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: #e8a9b4;
            color: #2c0f18;
            border-color: white;
        }
        .dots {
            position: fixed;
            bottom: 85px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 200;
        }
        .dot {
            width: 7px;
            height: 7px;
            background: #e8a9b4;
            border-radius: 50%;
            opacity: 0.4;
            transition: all 0.2s;
            cursor: pointer;
        }
        .dot.active {
            width: 22px;
            border-radius: 10px;
            opacity: 1;
            background: #f7c5d2;
        }

        .page-number {
            font-family: 'Amiri', serif;
            font-size: 0.7rem;
            text-align: center;
            color: #d49aae;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        /* محتوى الصفحات البسيط */
        .page-content {
            display: none;
            text-align: center;
        }
        .page-content.active-page {
            display: block;
        }
        .main-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e8a9b4, #c2778a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 2rem 0;
        }
        .three-dots {
            font-size: 3rem;
            letter-spacing: 8px;
            color: #c2778a;
            margin-top: 2rem;
        }
        .end-heart {
            font-size: 3rem;
            color: #e8a9b4;
            margin-top: 1.5rem;
        }
        .end-text {
            font-size: 2rem;
            font-weight: bold;
            color: #c2778a;
            margin-top: 1rem;
        }
        .surprise-btn {
            background: linear-gradient(105deg, #e8a9b4, #c2778a);
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            display: inline-block;
            margin: 1.5rem auto;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(194,119,138,0.4);
            transition: 0.2s;
        }
        .surprise-btn:hover {
            transform: scale(1.02);
        }
        .music-hint {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            color: #ffcfdf;
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 20px;
            z-index: 300;
        }
    </style>
</head>
<body>
<div class="star-field" id="starfield"></div>
<div class="book-wrapper">
    <div class="book">
        <div class="spine"></div>
        <div class="back-cover"></div>
        <div class="pages">
            <div class="page-scroll" id="pageScroll">
                <!-- الصفحة 1: افتتح المفاجأة -->
                <div class="page-content active-page" id="page0">
                    <div class="page-number">❁ ١ ❁</div>
                    <div class="main-title">افتتح المفاجأة</div>
                    <button class="surprise-btn" id="openSurpriseBtn">🎀 اضغطي لبدء الرحلة 🎀</button>
                </div>

                <!-- الصفحات 2 إلى 8: ثلاث نقاط فقط -->
                <div class="page-content" id="page1"><div class="page-number">❁ ٢ ❁</div><div class="three-dots">...</div></div>
                <div class="page-content" id="page2"><div class="page-number">❁ ٣ ❁</div><div class="three-dots">...</div></div>
                <div class="page-content" id="page3"><div class="page-number">❁ ٤ ❁</div><div class="three-dots">...</div></div>
                <div class="page-content" id="page4"><div class="page-number">❁ ٥ ❁</div><div class="three-dots">...</div></div>
                <div class="page-content" id="page5"><div class="page-number">❁ ٦ ❁</div><div class="three-dots">...</div></div>
                <div class="page-content" id="page6"><div class="page-number">❁ ٧ ❁</div><div class="three-dots">...</div></div>
                <div class="page-content" id="page7"><div class="page-number">❁ ٨ ❁</div><div class="three-dots">...</div></div>

                <!-- الصفحة 9: End ❤️ -->
                <div class="page-content" id="page8">
                    <div class="page-number">❁ ٩ ❁</div>
                    <div class="end-heart">❤️</div>
                    <div class="end-text">End</div>
                    <div style="margin-top: 1rem; color: #c2778a;">تمت الرحلة بحب 🤍</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="dots" id="dotsContainer"></div>
<div class="nav-buttons">
    <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-right"></i> السابق</button>
    <button class="nav-btn" id="nextBtn">التالي <i class="fas fa-chevron-left"></i></button>
</div>
<div class="music-hint" id="musicHint">🎵 الموسيقى هتشتغل تلقائياً 🤍</div>

<script>
    (function() {
        // Stars
        const starContainer = document.getElementById('starfield');
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.classList.add('star');
            s.style.width = Math.random() * 2.5 + 1 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 4 + 's';
            s.style.animationDuration = Math.random() * 3 + 2 + 's';
            starContainer.appendChild(s);
        }

        const totalPages = 9;
        let currentPage = 0;
        const pages = document.querySelectorAll('.page-content');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const dotsContainer = document.getElementById('dotsContainer');
        const openBtn = document.getElementById('openSurpriseBtn');

        function buildDots() {
            dotsContainer.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                if (i === currentPage) dot.classList.add('active');
                dot.addEventListener('click', () => goToPage(i));
                dotsContainer.appendChild(dot);
            }
        }

        function updateUI() {
            pages.forEach((page, idx) => {
                if (idx === currentPage) page.classList.add('active-page');
                else page.classList.remove('active-page');
            });
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                if (idx === currentPage) dot.classList.add('active');
                else dot.classList.remove('active');
            });
            document.querySelector('.page-scroll').scrollTop = 0;
        }

        function goToPage(pageIndex) {
            if (pageIndex >= 0 && pageIndex < totalPages) {
                currentPage = pageIndex;
                updateUI();
            }
        }

        function nextPage() {
            if (currentPage + 1 < totalPages) {
                currentPage++;
                updateUI();
            } else {
                canvasConfetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#e8a9b4', '#f5c6d6'] });
            }
        }

        function prevPage() {
            if (currentPage - 1 >= 0) {
                currentPage--;
                updateUI();
            }
        }

        prevBtn.addEventListener('click', prevPage);
        nextBtn.addEventListener('click', nextPage);

        if (openBtn) {
            openBtn.addEventListener('click', () => {
                if (currentPage === 0) {
                    goToPage(1);
                    canvasConfetti({ particleCount: 100, spread: 50, origin: { y: 0.5 }, colors: ['#e8a9b4', '#ffb7c5'] });
                } else {
                    goToPage(1);
                }
            });
        }

        // Touch swipe
        let touchStart = 0;
        const scrollElem = document.querySelector('.page-scroll');
        scrollElem.addEventListener('touchstart', (e) => {
            touchStart = e.changedTouches[0].clientX;
        });
        scrollElem.addEventListener('touchend', (e) => {
            const touchEnd = e.changedTouches[0].clientX;
            const diff = touchEnd - touchStart;
            if (Math.abs(diff) > 50) {
                if (diff > 0) prevPage();
                else nextPage();
            }
        });

        buildDots();
        updateUI();

        // Auto music
        let audio = null;
        function playMusic() {
            if (audio) return;
            audio = new Audio('song.mp3');
            audio.loop = true;
            audio.volume = 0.5;
            audio.play().then(() => {
                const hint = document.getElementById('musicHint');
                if (hint) hint.style.opacity = '0.5';
            }).catch(() => {
                document.body.addEventListener('click', function once() {
                    if (audio && !audio.paused) return;
                    if (!audio) audio = new Audio('song.mp3');
                    audio.loop = true;
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log);
                    document.body.removeEventListener('click', once);
                });
            });
        }
        setTimeout(playMusic, 1000);
    })();
</script>
</body>
</html>
