<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>منه وإسراء | كتاب الذكريات الحقيقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 40% 30%, #2c1a12 0%, #0f0805 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* wooden desk texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(160,100,40,0.08) 2%, transparent 2.5%),
                              repeating-linear-gradient(45deg, rgba(100,55,20,0.03) 0px, rgba(100,55,20,0.03) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* cinematic vignette */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            box-shadow: inset 0 0 130px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 2;
        }

        #starfield {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }
        .star {
            position: absolute;
            background: #ffeedd;
            border-radius: 50%;
            box-shadow: 0 0 3px #ffd9b5;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8);}
            100% { opacity: 0.7; transform: scale(1.2);}
        }

        /* main stage */
        .cinematic-stage {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2400px;
            perspective-origin: 50% 45%;
            z-index: 10;
        }

        .book-container {
            position: relative;
            width: min(94vw, 560px);
            height: min(88vh, 720px);
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: gentleFloat 4s infinite ease-in-out;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.5));
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-6px) rotateX(1deg); }
            100% { transform: translateY(0px) rotateX(0deg); }
        }

        .real-book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateY(-6deg) rotateX(2deg);
            transition: transform 0.4s ease;
        }
        .real-book:hover {
            transform: rotateY(-3deg) rotateX(1deg);
        }

        /* realistic spine */
        .book-spine-3d {
            position: absolute;
            right: -26px;
            top: 0;
            width: 26px;
            height: 100%;
            background: linear-gradient(135deg, #6e2c3f, #4a1929, #2f0f1b);
            transform: rotateY(90deg) translateZ(-13px);
            transform-origin: right center;
            border-radius: 8px 3px 3px 8px;
            box-shadow: inset -4px 0 12px rgba(0,0,0,0.5), 3px 0 8px rgba(0,0,0,0.3);
            border-left: 1px solid rgba(210,150,100,0.5);
        }

        .book-back-hard {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #5e2337, #3c1423);
            border-radius: 12px 4px 4px 12px;
            transform: translateZ(-12px);
            box-shadow: inset 2px 0 25px rgba(0,0,0,0.4);
        }

        .pages-edge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 12px;
            height: calc(100% - 4px);
            background: repeating-linear-gradient(180deg, #faf0e5, #faf0e5 2px, #eeddcc 2px, #eeddcc 4px);
            border-radius: 0 2px 2px 0;
            z-index: 5;
            opacity: 0.7;
            box-shadow: inset -2px 0 4px rgba(0,0,0,0.1);
        }

        .page-stack-area {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            border-radius: 8px 12px 12px 8px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255,235,200,0.2);
        }

        .current-page {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #fffaf2, #fef3e6);
            border-radius: 6px 12px 12px 6px;
            padding: 1.6rem 1.8rem 1.6rem 1.8rem;
            overflow-y: auto;
            scrollbar-width: thin;
            box-shadow: inset -3px 0 20px rgba(0,0,0,0.05), inset 8px 0 12px rgba(0,0,0,0.02);
            z-index: 20;
        }

        .current-page::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            border-radius: inherit;
            background: radial-gradient(ellipse at 20% 40%, rgba(255,235,190,0.3) 0%, transparent 70%);
            z-index: 2;
        }

        .page-curl-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 0% 50%, rgba(0,0,0,0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: 25;
            opacity: 0.4;
        }

        /* COVER with full author details */
        .cover-overlay {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            z-index: 200;
            transform-origin: right center;
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }
        .cover-closed {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #8b3c4f, #551e2f);
            border-radius: 12px 4px 4px 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,215,150,0.6);
            transform: translateZ(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            border-right: 2px solid #dbb072;
            padding: 1.5rem;
        }
        .cover-title {
            font-family: 'Amiri', serif;
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffefcf, #f7cf9f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
        }
        .cover-sub {
            color: #f7d9ae;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            border-top: 1px solid rgba(255,215,150,0.5);
            border-bottom: 1px solid rgba(255,215,150,0.5);
            padding: 0.5rem 0;
            display: inline-block;
        }
        .cover-author {
            color: #ffdaaa;
            font-size: 0.95rem;
            margin-top: 1rem;
            font-weight: 500;
        }
        .cover-love {
            color: #ffbf80;
            font-size: 0.85rem;
            margin-top: 1rem;
            font-style: italic;
        }
        .open-instruction {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            color: #fad49e;
            font-size: 0.8rem;
            animation: pulseOpacity 1.8s infinite;
            background: rgba(0,0,0,0.3);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        @keyframes pulseOpacity {
            0% { opacity: 0.4; transform: scale(0.98);}
            100% { opacity: 1; transform: scale(1);}
        }

        .cover-overlay.open-cover {
            transform: rotateY(-175deg) translateZ(2px);
            pointer-events: none;
        }

        /* flip animation */
        .flip-page-animation {
            position: absolute;
            inset: 0;
            z-index: 150;
            transform-style: preserve-3d;
            pointer-events: none;
        }
        .flip-card {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            transform-origin: left center;
            animation-duration: 0.75s;
            animation-timing-function: cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }
        .flip-front-page, .flip-back-page {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            background: linear-gradient(145deg, #fffaf2, #fef3e6);
            border-radius: 6px 12px 12px 6px;
            padding: 1.6rem 1.8rem;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,0.2);
        }
        .flip-front-page { transform: rotateY(0deg); }
        .flip-back-page { transform: rotateY(180deg); background: #fef0e2; }
        .dynamic-shadow {
            position: absolute;
            inset: 0;
            z-index: 151;
            pointer-events: none;
            background: linear-gradient(to left, rgba(0,0,0,0.4), transparent 30%);
            opacity: 0;
            transition: opacity 0.1s;
        }

        /* internal page styling */
        .photo-pair { display: flex; gap: 0.9rem; margin: 1.2rem 0; justify-content: center; flex-wrap: wrap; }
        .photo-frame { width: 45%; border-radius: 16px; overflow: hidden; border: 2px solid #e6c394; background: #f2e0cf; transition: all 0.2s; cursor: pointer; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .photo-frame img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .photo-label { font-size: 0.6rem; text-align: center; margin-top: 5px; color: #a5627a; }

        .player-wrap { background: #2f1b21e6; border-radius: 24px; padding: 1rem; margin: 1rem 0; backdrop-filter: blur(4px); }
        .gift-btn { background: linear-gradient(105deg, #e8a9b4, #c2778a); border: none; border-radius: 40px; padding: 0.7rem; width: 100%; font-weight: bold; color: white; margin-top: 1rem; cursor: pointer; transition: 0.2s; }
        .gift-reveal { background: #fff3e8; border-radius: 24px; padding: 1rem; margin-top: 0.8rem; display: none; text-align: center; }
        .gift-reveal.show { display: block; animation: fadeSlide 0.4s ease; }

        .chapter-header { display: flex; gap: 12px; align-items: center; border-bottom: 2px solid #e6c39480; margin-bottom: 1rem; }
        .story-body { font-size: 0.95rem; line-height: 1.8; color: #3c2a2a; font-weight: 500; min-height: 100px; }
        .page-number { font-family: 'Amiri', serif; text-align: center; color: #b4836b; margin-bottom: 0.5rem; }
        .ornament { text-align: center; color: #c9a87b; letter-spacing: 5px; margin: 0.5rem 0; }

        .nav-hint { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; gap: 8px; justify-content: center; z-index: 300; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); width: fit-content; margin: 0 auto; border-radius: 40px; padding: 5px 12px; }
        .hint-dot { width: 7px; height: 7px; background: #eccfae; border-radius: 50%; opacity: 0.5; transition: 0.2s; }
        .hint-dot.active { width: 20px; border-radius: 10px; background: #ffcd94; opacity: 1; }

        .book-nav-btn { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); border: 1px solid #dbb072; color: #ffdfb3; width: 48px; height: 48px; border-radius: 60px; cursor: pointer; z-index: 300; transition: 0.2s; font-size: 1.3rem; display: none; }
        #btnPrev { right: 16px; }
        #btnNext { left: 16px; }
        .book-nav-btn:hover { background: #c2778a; color: white; border-color: white; }

        @keyframes flipForwardAnim {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(-85deg) perspective(800px) scale(0.98); }
            100% { transform: rotateY(-180deg); }
        }
        @keyframes flipBackwardAnim {
            0% { transform: rotateY(-180deg); }
            50% { transform: rotateY(-85deg) perspective(800px) scale(0.98); }
            100% { transform: rotateY(0deg); }
        }
        .player-art.playing { animation: spin 3s linear infinite; }
        @keyframes spin { to{ transform:rotate(360deg); } }
        .gallery-main-img { cursor: pointer; transition: transform 0.2s; width:100%; border-radius:24px; max-height:45vh; object-fit:contain; }
    </style>
</head>
<body>
<div id="starfield"></div>
<div class="cinematic-stage">
    <div class="book-container" id="bookContainer">
        <div class="real-book" id="realBook">
            <div class="book-spine-3d"></div>
            <div class="book-back-hard"></div>
            <div class="pages-edge"></div>
            <div class="page-stack-area" id="pageStackArea">
                <div class="current-page" id="currentPageElement">
                    <div id="pageContentHolder"></div>
                </div>
                <div class="page-curl-glow"></div>
            </div>
            <!-- COVER with full details -->
            <div class="cover-overlay" id="bookCover">
                <div class="cover-closed">
                    <div class="cover-title">🌸 منه وإسراء 🌸</div>
                    <div class="cover-sub">قصة خمس سنين</div>
                    <div class="cover-author">✍🏻 تأليف: إسراء أحمد مراد</div>
                    <div class="cover-love">🤍 صُنع بكل حب 🤍</div>
                    <div class="open-instruction"><i class="fas fa-hand-pointer"></i> اضغطي لفتح الكتاب</div>
                </div>
            </div>
            <div class="flip-page-animation" id="flipAnimContainer" style="display: none;">
                <div class="flip-card" id="flipCard">
                    <div class="flip-front-page" id="flipFrontContent"></div>
                    <div class="flip-back-page" id="flipBackContent"></div>
                </div>
                <div class="dynamic-shadow" id="dynamicShadow"></div>
            </div>
        </div>
    </div>
</div>
<div id="navHint" class="nav-hint"></div>
<button class="book-nav-btn" id="btnPrev"><i class="fas fa-chevron-right"></i></button>
<button class="book-nav-btn" id="btnNext"><i class="fas fa-chevron-left"></i></button>
<div id="lightbox" style="position: fixed; inset: 0; background: #000000dd; backdrop-filter: blur(25px); display: none; align-items: center; justify-content: center; z-index: 9999; cursor: pointer;"><img id="lightboxImg" style="max-width: 90%; max-height: 85%; border-radius: 20px;"></div>

<script>
    (function() {
        // starfield
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 110; i++) {
            const s = document.createElement('div');
            s.classList.add('star');
            s.style.width = Math.random() * 2.5 + 1 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 5 + 's';
            s.style.animationDuration = Math.random() * 4 + 2 + 's';
            starfield.appendChild(s);
        }

        // chapters data
        const chapters = [
            { icon:'🌱', title:'بداية الحكاية', text:`من تانيه ثانوي… بقالنا خمس سنين 🤍\n\nخمس سنين من الضحك، الدموع، الأسرار، والأحلام. من أول يوم حسيت إنك مش مجرد زميلة، انتِ كنتِ الأخت اللي اختارها قلبي.\n\nكنتِ الشخص اللي بيشوفني على حقيقتي، وبدون ما أحاول أكون مثالية، كنتِ بتحبيني زي ما أنا. ✨`, photos:[1,2], pageNum:'❧  ١  ❧', hasPlayer:true, hasGift:false },
            { icon:'💔', title:'لما الدنيا شتتنا', text:`لما بقيت في حياتي، صلحت حاجات كتير كانت ضايعة مني زمان. كنتِ النور اللي خلاني أشوف نفسي بشكل تاني…\n\nبس بعدين الدنيا غيرتنا، وتهت، معرفتش أعمل صحاب حقيقيين تاني. كنت محتاجاكِ معايا طول الوقت.\n\nمن غيرك حسيت إني وحيدة، حتى لو حواليا ناس كتير. وحشتيني أوي يا منه 🌙`, photos:[3,4], pageNum:'❧  ٢  ❧', hasPlayer:false, hasGift:false },
            { icon:'🤍', title:'شكرًا لأنك كنتِ', text:`عمري ما كان في حياتي حد يتقبلني زي ما أنا ويحبني كدا من غير سبب. انتِ كنتِ أول حد حسسني إن أنا كفاية.\n\nإن أنا جميلة بمزاجي وبعيوبي. انتِ كنتِ السبب اللي خلاني أحب نفسي أكتر.\n\nكل لحظة قضيناها سوا كانت هدية. أنا ممتنة لكل ضحكة، لكل عناق، لكل ليلة سهرنا نحكي فيها لحد الفجر. 🌸`, photos:[5,6], pageNum:'❧  ٣  ❧', hasPlayer:false, hasGift:false },
            { icon:'⭐', title:'دايمًا مع بعض', text:`ربنا ما يحرمني منك أبدًا. انتِ أجمل حاجة حصلت في حياتي، وهفضل أحبك دايمًا.\n\nحتى لو المسافات بعُدت، قلوبنا لسه قريبة. وهفضل أفتكر إننا مرة كنا جدعنة صحاب، وإن الصحبة الحقيقية مش بتنتهي.\n\nبحبك يا منه، أكتر مما تتخيلي. 💖`, photos:[7,8], pageNum:'❧  ٤  ❧', hasGift:true, hasPlayer:false },
            { icon:'📷', title:'ذكرياتنا', text:null, isGallery:true, pageNum:'❧  ٥  ❧', hasPlayer:false, hasGift:false }
        ];
        let currentPageIdx = 0;
        let isAnimating = false;
        let coverOpened = false;
        let audioPlayer = null;
        let flipSound = null;
        let galleryCurrent = 0;
        const totalGallery = 12;
        let typedState = new Array(chapters.length).fill(false);
        let typedHtmlStore = new Array(chapters.length).fill(null);

        function buildPhotoHTML(photos) {
            return `<div class="photo-pair">${photos.map(n => `<div><div class="photo-frame" data-src="images/${n}.jpg"><img src="images/${n}.jpg" onerror="this.src='https://placehold.co/300x300/f5e0e8/c2778a?text=${n}'"></div><div class="photo-label">لحظة ${n}</div></div>`).join('')}</div>`;
        }
        
        function buildPageContent(ch, idx) {
            if(ch.isGallery) {
                return `
                <div class="page-number">${ch.pageNum}</div>
                <div class="chapter-header"><div class="chapter-icon" style="font-size:1.6rem;">${ch.icon}</div><div class="chapter-title-text">${ch.title}</div></div>
                <div class="ornament">— ✦ —</div>
                <div class="gallery-wrap" style="text-align:center">
                    <img id="galImg" class="gallery-main-img" src="images/1.jpg" onerror="this.src='https://placehold.co/500x500/f5e0e8/c2778a?text=1'">
                    <div style="display:flex; justify-content:center; gap:1rem; margin-top:0.8rem">
                        <button class="gal-nav-btn" data-dir="prev">▶️ السابقة</button>
                        <span id="galCounter">1 / ${totalGallery}</span>
                        <button class="gal-nav-btn" data-dir="next">التالية ◀️</button>
                    </div>
                    <p style="font-size:0.7rem; margin-top:10px;">✨ اضغطي على الصورة للتكبير</p>
                </div>`;
            }
            let html = `<div class="page-number">${ch.pageNum}</div><div class="chapter-header"><div class="chapter-icon" style="font-size:1.6rem;">${ch.icon}</div><div class="chapter-title-text">${ch.title}</div></div><div class="ornament">— ✦ —</div><div class="story-body" id="storyTextTarget"></div>${buildPhotoHTML(ch.photos)}`;
            if(ch.hasGift) html += `<button class="gift-btn" id="dynamicGiftBtn"><i class="fas fa-gift"></i> هدية من قلبي 🎁</button><div class="gift-reveal" id="dynamicGiftReveal"><span class="big-heart">💖</span><br>منه يا أجمل صديقة على الإطلاق…<br> انتِ معجزة في حياتي. ربنا يخليكي ليا دايمًا. 🤍</div>`;
            if(ch.hasPlayer && idx===0) html += `<div class="player-wrap" id="musicPlayerWrap"><div class="player-row"><div class="player-art" id="playerArtIcon"><i class="fas fa-music"></i></div><div><div class="player-name">أغنية لصديقتي 🎵</div><div class="player-sub">بمناسبة خمس سنين</div></div></div><div class="player-controls" style="display:flex; gap:0.8rem; justify-content:center;"><button id="playCtrl"><i class="fas fa-play"></i></button><button id="stopCtrl"><i class="fas fa-stop"></i></button></div><div class="progress-track-wrap" style="margin-top:8px;"><input type="range" id="songProgress" value="0" step="any" style="width:100%"/></div></div>`;
            return html;
        }

        function typeWriterEffect(el, text, speed=26) {
            el.innerHTML = '';
            let i=0;
            function write() {
                if(i<text.length) {
                    el.innerHTML += text[i]==='\n'?'<br>':text[i];
                    i++;
                    setTimeout(write, speed);
                } else typedHtmlStore[currentPageIdx] = el.innerHTML;
            }
            write();
        }

        function renderCurrentPage() {
            const container = document.getElementById('pageContentHolder');
            const ch = chapters[currentPageIdx];
            container.innerHTML = buildPageContent(ch, currentPageIdx);
            if(!ch.isGallery && document.getElementById('storyTextTarget')) {
                const targetDiv = document.getElementById('storyTextTarget');
                if(typedHtmlStore[currentPageIdx]) targetDiv.innerHTML = typedHtmlStore[currentPageIdx];
                else if(!typedState[currentPageIdx]) {
                    typedState[currentPageIdx]=true;
                    typeWriterEffect(targetDiv, ch.text);
                } else targetDiv.innerHTML = ch.text.replace(/\n/g,'<br>');
            }
            if(ch.isGallery) {
                galleryCurrent = 0;
                updateGalleryDisplay();
                document.querySelectorAll('.gal-nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if(btn.dataset.dir === 'next') galleryCurrent = (galleryCurrent+1) % totalGallery;
                        else galleryCurrent = (galleryCurrent-1+totalGallery)%totalGallery;
                        updateGalleryDisplay();
                    });
                });
                const galImgElem = document.getElementById('galImg');
                if(galImgElem) galImgElem.addEventListener('click', () => openLightbox(galImgElem.src));
            }
            attachDelegatedEvents();
            updateDots();
            if(ch.hasPlayer && currentPageIdx===0 && !window.playerInited) initAudioPlayer();
        }
        
        function attachDelegatedEvents() {
            document.querySelectorAll('.photo-frame').forEach(f => {
                f.removeEventListener('click', photoHandler);
                f.addEventListener('click', photoHandler);
            });
            const giftBtn = document.getElementById('dynamicGiftBtn');
            if(giftBtn) {
                giftBtn.onclick = () => {
                    const reveal = document.getElementById('dynamicGiftReveal');
                    if(reveal && !reveal.classList.contains('show')) {
                        reveal.classList.add('show');
                        fireConfetti();
                        giftBtn.style.display = 'none';
                    }
                };
            }
        }
        function photoHandler(e) { const img = this.querySelector('img'); if(img && img.src) openLightbox(img.src); }
        function openLightbox(src) { const lb=document.getElementById('lightbox'); document.getElementById('lightboxImg').src=src; lb.style.display='flex'; }
        document.getElementById('lightbox').addEventListener('click', ()=>document.getElementById('lightbox').style.display='none');
        function fireConfetti() { canvasConfetti({particleCount:200, spread:80, origin:{y:0.6}, colors:['#e8a9b4','#f0d9b5']}); }
        function updateDots() { const dots = document.querySelectorAll('.hint-dot'); dots.forEach((d,i)=>i===currentPageIdx?d.classList.add('active'):d.classList.remove('active')); }
        
        function initAudioPlayer() {
            if(window.playerInited) return;
            window.playerInited=true;
            audioPlayer = new Audio('song.mp3');
            audioPlayer.volume = 0.6;
            const playBtn = document.getElementById('playCtrl');
            const stopBtn = document.getElementById('stopCtrl');
            const progressSlider = document.getElementById('songProgress');
            if(!playBtn) return;
            playBtn.onclick = () => {
                if(audioPlayer.paused) { audioPlayer.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; document.getElementById('playerArtIcon')?.classList.add('playing'); }
                else { audioPlayer.pause(); playBtn.innerHTML='<i class="fas fa-play"></i>'; document.getElementById('playerArtIcon')?.classList.remove('playing'); }
            };
            stopBtn.onclick = () => { audioPlayer.pause(); audioPlayer.currentTime=0; playBtn.innerHTML='<i class="fas fa-play"></i>'; };
            audioPlayer.addEventListener('timeupdate',()=>{ if(progressSlider) progressSlider.value = (audioPlayer.currentTime/audioPlayer.duration)*100 || 0; });
            audioPlayer.addEventListener('ended',()=>{ playBtn.innerHTML='<i class="fas fa-play"></i>'; document.getElementById('playerArtIcon')?.classList.remove('playing'); });
            if(progressSlider) progressSlider.addEventListener('input',(e)=>{ if(audioPlayer.duration) audioPlayer.currentTime = (e.target.value/100)*audioPlayer.duration; });
        }
        
        function playFlipSound() { if(!flipSound) { flipSound = new Audio('song2.mp3'); flipSound.volume=0.5; } flipSound.cloneNode().play().catch(()=>{}); }
        
        function flipPage(direction) {
            if(isAnimating || !coverOpened) return;
            let newIdx = direction === 'next' ? currentPageIdx+1 : currentPageIdx-1;
            if(newIdx<0 || newIdx>=chapters.length) return;
            isAnimating=true;
            playFlipSound();
            const flipContainer = document.getElementById('flipAnimContainer');
            const flipCard = document.getElementById('flipCard');
            const shadowDiv = document.getElementById('dynamicShadow');
            const currentContentDiv = document.getElementById('pageContentHolder').cloneNode(true);
            const nextCh = chapters[newIdx];
            const nextHtml = buildPageContent(nextCh, newIdx);
            document.getElementById('flipFrontContent').innerHTML = `<div style="padding:1.5rem;">${currentContentDiv.innerHTML}</div>`;
            document.getElementById('flipBackContent').innerHTML = `<div style="padding:1.5rem;">${nextHtml}</div>`;
            flipContainer.style.display = 'block';
            document.getElementById('currentPageElement').style.opacity = '0';
            shadowDiv.style.opacity = '0.5';
            flipCard.style.animation = 'none';
            flipCard.offsetHeight;
            if(direction === 'next') flipCard.style.animation = 'flipForwardAnim 0.7s cubic-bezier(0.2,0.9,0.4,1.1) forwards';
            else flipCard.style.animation = 'flipBackwardAnim 0.7s cubic-bezier(0.2,0.9,0.4,1.1) forwards';
            const shadowAnim = setInterval(()=>{ if(shadowDiv) shadowDiv.style.opacity = parseFloat(shadowDiv.style.opacity||0) > 0.2 ? '0.15' : '0.55'; }, 150);
            setTimeout(()=>{
                clearInterval(shadowAnim);
                shadowDiv.style.opacity = '0';
                flipContainer.style.display = 'none';
                currentPageIdx = newIdx;
                renderCurrentPage();
                document.getElementById('currentPageElement').style.opacity = '1';
                isAnimating=false;
                updateDots();
            }, 680);
        }
        
        function openBookCover() {
            if(coverOpened) return;
            coverOpened = true;
            const coverEl = document.getElementById('bookCover');
            coverEl.classList.add('open-cover');
            playFlipSound();
            setTimeout(()=>{
                coverEl.style.display = 'none';
                document.getElementById('btnPrev').style.display = 'flex';
                document.getElementById('btnNext').style.display = 'flex';
                renderCurrentPage();
            }, 1100);
        }
        
        function updateGalleryDisplay() {
            const img = document.getElementById('galImg');
            const cnt = document.getElementById('galCounter');
            if(img) { let n=galleryCurrent+1; img.src = `images/${n}.jpg`; img.onerror=()=>img.src=`https://placehold.co/500x500/f5e0e8/c2778a?text=${n}`; }
            if(cnt) cnt.innerText = `${galleryCurrent+1} / ${totalGallery}`;
        }
        
        // build dots
        const hintDiv = document.getElementById('navHint');
        for(let i=0;i<chapters.length;i++) { let dot = document.createElement('div'); dot.classList.add('hint-dot'); hintDiv.appendChild(dot); }
        updateDots();
        
        document.getElementById('bookCover').addEventListener('click', openBookCover);
        document.getElementById('btnNext').addEventListener('click', ()=> flipPage('next'));
        document.getElementById('btnPrev').addEventListener('click', ()=> flipPage('prev'));
        
        let touchStart=0; 
        document.querySelector('.cinematic-stage').addEventListener('touchstart', e=> touchStart=e.changedTouches[0].screenX);
        document.querySelector('.cinematic-stage').addEventListener('touchend', e=> {
            if(!coverOpened || isAnimating) return;
            let diff = e.changedTouches[0].screenX - touchStart;
            if(Math.abs(diff)>45) diff>0 ? flipPage('prev') : flipPage('next');
        });
    })();
</script>
</body>
</html>
